repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace --all-targets
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test (offline)
        entry: bash -c 'cargo build -p issuetracker-cli && cargo test --workspace'
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: no-credentials
        name: check for leaked credentials
        entry: bash -c 'grep -inEf .credential-patterns "$@" && exit 1 || exit 0' --
        language: system
        types_or: [rust, toml, markdown, yaml]
