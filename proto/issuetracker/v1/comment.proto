syntax = "proto3";

package issuetracker.v1;

import "google/protobuf/timestamp.proto";

service CommentService {
  rpc CreateComment(CreateCommentRequest) returns (Comment);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
  rpc UpdateComment(UpdateCommentRequest) returns (Comment);
  rpc HideComment(HideCommentRequest) returns (Comment);
  rpc ListCommentRevisions(ListCommentRevisionsRequest) returns (ListCommentRevisionsResponse);
}

message Comment {
  int64 comment_id = 1;
  int64 issue_id = 2;
  string author = 3;
  string body = 4;
  bool is_description = 5;
  google.protobuf.Timestamp create_time = 6;
  optional google.protobuf.Timestamp modify_time = 7;
  bool hidden = 8;
  string hidden_by = 9;
  optional google.protobuf.Timestamp hidden_time = 10;
  int32 revision_count = 11;
}

message CommentRevision {
  int64 revision_id = 1;
  int64 comment_id = 2;
  string body = 3;
  string edited_by = 4;
  google.protobuf.Timestamp create_time = 5;
}

message CreateCommentRequest {
  int64 issue_id = 1;
  string body = 2;
  string author = 3;
}

message ListCommentsRequest {
  int64 issue_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListCommentsResponse {
  repeated Comment comments = 1;
  string next_page_token = 2;
}

message UpdateCommentRequest {
  int64 comment_id = 1;
  string body = 2;
}

message HideCommentRequest {
  int64 comment_id = 1;
  bool hidden = 2;
}

message ListCommentRevisionsRequest {
  int64 comment_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListCommentRevisionsResponse {
  repeated CommentRevision revisions = 1;
  string next_page_token = 2;
}
